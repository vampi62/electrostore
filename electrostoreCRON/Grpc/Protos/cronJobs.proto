syntax = "proto3";

option csharp_namespace = "ElectrostoreCRON.Grpc";

package cronJobs;

service CronJobsGrpc {
  rpc GetEnabledCronJobs (GetEnabledCronJobsRequest) returns (GetEnabledCronJobsReply);
  rpc UpdateCronJobRun   (UpdateCronJobRunRequest)   returns (UpdateCronJobRunReply);
}

// ---- Enums ----

enum CronJobAction {
  PACKAGE_TRACKING = 0;
  IA_RETRAIN = 1;
  STOCK_LOW_ALERT = 2;
}

// ---- CronJobs ----

message GetEnabledCronJobsRequest {}

message GetEnabledCronJobsReply {
  repeated CronJobItem cron_jobs = 1;
}

message CronJobItem {
  int32  id_cronjob            = 1;
  string name_cronjob          = 2;
  string cron_expression       = 3;
  CronJobAction action_cronjob = 4;
  string params_cronjob        = 5; // JSON stringfied parameters, content depends on action_cronjob
  string last_run_at           = 6; // ISO 8601
  string next_run_at           = 7; // ISO 8601
}

// ---- Update CronJob Run ----

message UpdateCronJobRunRequest {
  int32  id_cronjob   = 1;
  string last_run_at  = 2; // ISO 8601
  string next_run_at  = 3; // ISO 8601
}

message UpdateCronJobRunReply {
  bool success = 1;
}