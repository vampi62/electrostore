syntax = "proto3";

option csharp_namespace = "ElectrostoreWORKER.Grpc";

package workerToApi;

service WORKERToAPIGrpc {
  rpc UpdateStoreMqttStatus  (UpdateStoreMqttStatusRequest)  returns (UpdateStoreMqttStatusReply);
  rpc UpdateIaStatus         (UpdateIaStatusRequest)         returns (UpdateIaStatusReply);
  rpc GetConfig              (WORKERGetConfigRequest)         returns (WORKERGetConfigReply);
}

// ---- Store MQTT status ----

message UpdateStoreMqttStatusRequest {
  string mqtt_name_store       = 1;
  bool   is_mqtt_connected     = 2;
}

message UpdateStoreMqttStatusReply {
  bool success      = 1;
  int32 store_count = 2; // nombre de stores mis à jour
}

// ---- IA status ----

message UpdateIaStatusRequest {
  int32  id_ia        = 1;
  string action       = 2; // training_started | training_completed | training_failed
  int32  requested_by = 3;
  string message      = 4;
  float  accuracy     = 5;
  float  val_accuracy = 6;
  float  loss         = 7;
  float  val_loss     = 8;
  int32  epoch        = 9;
}

message UpdateIaStatusReply {
  bool success = 1;
}

// ---- Config ----

message WORKERGetConfigRequest {}

message WORKERGetConfigReply {
  bool demo_mode = 1;
}
