syntax = "proto3";

option csharp_namespace = "ElectrostoreWORKER.Grpc";

package config;

service ConfigGrpc {
  rpc GetConfig          (GetConfigRequest)       returns (GetConfigReply);
}

message GetConfigRequest {}

message GetConfigReply {
  bool demo_mode = 1;
  repeated string allowed_image_extensions = 2;
}
