name: tests

on:
  workflow_call:
    inputs:
      branch:
        description: 'The branch that triggered this workflow.'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      branch:
        description: 'The branch that triggered this workflow.'
        required: true
        type: string

jobs:
  test-backend:
    name: tests - ${{ matrix.service_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service_name: API
            source_dir: electrostoreAPI
            sonar_key: electrostore-api
          - service_name: IA
            source_dir: electrostoreIA
            sonar_key: electrostore-ia
          - service_name: NOTIF
            source_dir: electrostoreNOTIF
            sonar_key: electrostore-notif
          - service_name: CRON
            source_dir: electrostoreCRON
            sonar_key: electrostore-cron
          - service_name: WORKER
            source_dir: electrostoreWORKER
            sonar_key: electrostore-worker
    defaults:
      run:
        shell: bash
        working-directory: ./${{ matrix.source_dir }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.branch }}
    - name: Set up C#
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    - name: Install dependencies
      run: dotnet restore
    - name: Run tests and collect coverage (OpenCover)
      run: |
        dotnet test ../tests/${{ matrix.source_dir }} \
          --collect "XPlat Code Coverage" \
          --logger "trx;LogFileName=test-results.trx" \
          --results-directory ./TestResults \
          -- \
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
    - name: Run SonarQube scan
      id: sonarqube
      continue-on-error: true
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        PROJECT_KEY: "${{ inputs.branch }}-${{ matrix.sonar_key }}"
      run: |
        dotnet tool install --global dotnet-sonarscanner
        dotnet sonarscanner begin /k:"$PROJECT_KEY" \
          /d:sonar.host.url="$SONAR_HOST_URL" \
          /d:sonar.token="$SONAR_TOKEN" \
          /d:sonar.exclusions="**/Migrations/**" \
          /d:sonar.cpd.exclusions="**/DTO/**,**/Models/**" \
          /d:sonar.cs.vstest.reportsPaths=../${{ matrix.source_dir }}/TestResults/*.trx \
          /d:sonar.cs.opencover.reportsPaths=../${{ matrix.source_dir }}/TestResults/**/coverage.opencover.xml
        dotnet build
        dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
    - name: SonarQube Status
      if: steps.sonarqube.outcome == 'failure'
      run: |
        echo "::warning::SonarQube scan failed - server may be unreachable"

  test-frontend:
    name: tests - FRONT
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./electrostoreFRONT
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.branch }}
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
    - name: Install dependencies
      run: npm install
    - name: Install test dependencies
      run: cd ../tests/electrostoreFRONT && npm install
    - name: Run unit tests with coverage
      run: cd ../tests/electrostoreFRONT && npm run test:unit -- --coverage --coverage.reporter=lcov
    - name: Cypress run
      env:
        VITE_API_URL: http://localhost/vite_api_url_placeholder/api
      uses: cypress-io/github-action@v6
      with:
        start: npm run dev
        wait-on: 'http://localhost:5173'
        wait-on-timeout: 30
        working-directory: ./tests/electrostoreFRONT
    - name: Upload screenshots
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: cypress-screenshots
        path: tests/electrostoreFRONT/cypress/screenshots
    - name: SonarScanner
      id: sonarqube
      continue-on-error: true
      uses: SonarSource/sonarqube-scan-action@v6
      env:
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=${{ inputs.branch }}-electrostore-front
          -Dsonar.projectName=${{ inputs.branch }}-electrostore-front
          -Dsonar.sources=electrostoreFRONT
          -Dsonar.javascript.lcov.reportPaths=tests/electrostoreFRONT/coverage/lcov.info
          -Dsonar.cfamily.cache.enabled=false
    - name: SonarQube Status
      if: steps.sonarqube.outcome == 'failure'
      run: |
        echo "::warning::SonarQube scan failed - server may be unreachable"
